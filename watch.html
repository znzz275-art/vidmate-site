<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VidMate — مشاهدة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#f5820d;--pd:#d96a00;--bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--br:#2a2a2a;--tx:#f0f0f0;--mt:#888;--gn:#22c55e}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
a{text-decoration:none;color:inherit}
header{background:rgba(8,8,8,.96);border-bottom:1px solid var(--br);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.logo{font-size:18px;font-weight:900;color:var(--p);display:flex;align-items:center;gap:6px}
.logo-box{width:28px;height:28px;background:var(--p);border-radius:7px;display:grid;place-items:center;font-size:13px;color:#fff}
.back-btn{background:var(--s2);border:1.5px solid var(--br);color:var(--tx);padding:6px 13px;border-radius:16px;font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s}
.back-btn:hover{border-color:var(--p);color:var(--p)}
.dl-hdr-btn{background:var(--p);border:none;color:#fff;padding:7px 16px;border-radius:16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-right:auto}
/* layout */
.layout{display:grid;grid-template-columns:1fr 340px;gap:0;max-width:1160px;margin:0 auto;padding:16px;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr;padding:0}.rel-col{padding:16px}}
/* player */
.player-wrap{border-radius:12px;overflow:hidden;background:#000;aspect-ratio:16/9;margin-bottom:14px}
.player-wrap iframe{width:100%;height:100%;border:none;display:block}
/* info */
.vtitle{font-size:17px;font-weight:700;line-height:1.4;margin-bottom:10px}
.meta-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.meta-it{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--mt)}
.meta-it strong{color:var(--tx)}
/* action buttons */
.act-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.abtn{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:20px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.a-dl{background:var(--p);color:#fff}.a-dl:hover{background:var(--pd)}
.a-yt{background:var(--s2);color:var(--tx);border:1.5px solid var(--br)}.a-yt:hover{border-color:var(--p);color:var(--p)}
.a-sh{background:var(--s2);color:var(--tx);border:1.5px solid var(--br)}.a-sh:hover{border-color:var(--p);color:var(--p)}
/* channel */
.ch-card{background:var(--s1);border:1.5px solid var(--br);border-radius:12px;padding:13px;margin-bottom:13px;display:flex;align-items:center;gap:11px}
.ch-av{width:44px;height:44px;border-radius:50%;background:var(--p);display:grid;place-items:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.ch-name{font-size:14px;font-weight:700}
.ch-sub{font-size:11px;color:var(--mt);margin-top:2px}
.sub-btn{background:var(--p);color:#fff;border:none;padding:7px 16px;border-radius:16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-right:auto}
/* description */
.desc-box{background:var(--s1);border:1.5px solid var(--br);border-radius:12px;padding:13px;margin-bottom:13px}
.desc-hd{font-size:12px;font-weight:700;color:var(--mt);margin-bottom:7px}
.desc-body{font-size:13px;line-height:1.7;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.desc-body.open{-webkit-line-clamp:unset}
.desc-toggle{color:var(--p);font-size:12px;cursor:pointer;margin-top:5px;display:inline-block}
/* tags */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.tag{background:var(--s2);border:1.5px solid var(--br);border-radius:14px;padding:4px 10px;font-size:11px;color:var(--mt);cursor:pointer}
.tag:hover{border-color:var(--p);color:var(--p)}
/* quality overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.panel{background:var(--s1);border-top:2px solid var(--p);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto}
.ph{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.qrow{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1.5px solid var(--br);border-radius:9px;padding:10px 14px;margin-bottom:7px;cursor:pointer;transition:.15s}
.qrow:hover{border-color:var(--p)}
.ql{font-size:13px;font-weight:700}.qm{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mt)}
.qbtn{background:var(--p);color:#fff;border:none;padding:5px 12px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
/* related */
.rel-col{padding-left:16px}
@media(max-width:860px){.rel-col{padding-left:0}}
.rel-title{font-size:15px;font-weight:700;margin-bottom:12px}
.rel-card{display:flex;gap:9px;margin-bottom:11px;cursor:pointer;padding:7px;border-radius:9px;transition:.15s}
.rel-card:hover{background:var(--s2)}
.rel-thumb{width:128px;height:72px;border-radius:7px;background:#000;overflow:hidden;flex-shrink:0;position:relative}
.rel-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.rdur{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.85);color:#fff;font-size:9px;padding:2px 4px;border-radius:3px}
.rel-info{flex:1;overflow:hidden}
.rel-t{font-size:11px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rel-ch{font-size:10px;color:var(--mt);margin-top:2px}
.rel-v{font-size:10px;color:var(--mt)}
/* skeleton */
.sk{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200%;animation:sh 1.4s infinite;border-radius:5px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* toast */
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--s3);color:#fff;padding:9px 20px;border-radius:22px;font-size:13px;border:1px solid var(--br);opacity:0;transition:.3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header>
  <button class="back-btn" onclick="history.back()">← رجوع</button>
  <a class="logo" href="vidmate_index.html"><div class="logo-box">▶</div>VidMate</a>
  <button class="dl-hdr-btn" onclick="openOv()">⬇️ تحميل</button>
</header>

<div class="layout">
  <!-- Player + info -->
  <div>
    <div class="player-wrap" id="playerWrap">
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000">
        <div style="text-align:center;color:var(--mt)"><div style="font-size:32px;animation:spin 1s linear infinite;display:inline-block">⏳</div><p style="margin-top:8px;font-size:13px">جاري تحميل الفيديو...</p></div>
      </div>
    </div>
    <div id="vInfo"><div style="padding:0 4px">
      <div class="sk" style="height:22px;margin-bottom:10px"></div>
      <div class="sk" style="height:14px;width:50%;margin-bottom:18px"></div>
      <div class="sk" style="height:70px;border-radius:10px"></div>
    </div></div>
  </div>
  <!-- Related -->
  <div class="rel-col">
    <div class="rel-title">فيديوهات مشابهة</div>
    <div id="relList">
      ${Array(6).fill(0).map(()=>`
      <div style="display:flex;gap:9px;margin-bottom:11px">
        <div class="sk" style="width:128px;height:72px;border-radius:7px;flex-shrink:0"></div>
        <div style="flex:1"><div class="sk" style="height:12px;margin-bottom:5px"></div><div class="sk" style="height:10px;width:70%"></div></div>
      </div>`).join('')}
    </div>
  </div>
</div>

<!-- Quality Overlay -->
<div class="ov" id="ov" onclick="if(event.target===this)closeOv()">
  <div class="panel">
    <div class="ph">⬇️ اختر الجودة <span style="cursor:pointer;color:var(--mt);font-size:20px" onclick="closeOv()">✕</span></div>
    <div id="pc"></div>
  </div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="vidmate_shared.js"></script>
<script>
const QUALS=[
  {q:'4K Ultra HD',s:'~800 MB',i:'⭐'},{q:'1080p Full HD',s:'~250 MB',i:'🔵'},
  {q:'720p HD',s:'~120 MB',i:'🟢'},{q:'480p',s:'~60 MB',i:'🟡'},
  {q:'360p',s:'~30 MB',i:'🟠'},{q:'240p',s:'~15 MB',i:'🔴'},
];

const vid = new URLSearchParams(location.search).get('v');
let vData = null;

if (!vid) {
  document.getElementById('playerWrap').innerHTML=`<div style="display:grid;place-items:center;height:100%;background:#000;color:var(--mt);font-size:14px">⚠️ لم يتم تحديد فيديو — <a href="vidmate_index.html" style="color:var(--p)">رجوع</a></div>`;
} else {
  // Show player immediately — no API needed
  document.getElementById('playerWrap').innerHTML=
    `<iframe src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&rel=0&modestbranding=1&hl=ar&playsinline=1"
      allow="autoplay;encrypted-media;picture-in-picture;fullscreen" allowfullscreen></iframe>`;
  // Load details
  loadDetails(vid);
}

async function loadDetails(id) {
  vData = await YT.getVideo(id);
  document.title = `VidMate — ${vData.title}`;
  renderInfo(vData);
  loadRelated(vData.title, id);
}

function renderInfo(v) {
  document.getElementById('vInfo').innerHTML=`
    <div style="padding:0 4px">
      <div class="vtitle">${v.title}</div>
      <div class="meta-row">
        <div class="meta-it">👁 <strong>${v.views}</strong></div>
        <div class="meta-it">⏱ <strong>${v.duration}</strong></div>
        <div class="meta-it">👍 <strong>${v.likes||'—'}</strong></div>
        ${v.pubDate?`<div class="meta-it">📅 <strong>${v.pubDate}</strong></div>`:''}
      </div>
      <div class="act-row">
        <button class="abtn a-dl" onclick="openOv()">⬇️ تحميل</button>
        <a href="${v.url}" target="_blank"><button class="abtn a-yt">▶️ يوتيوب</button></a>
        <button class="abtn a-sh" onclick="shareVid()">🔗 مشاركة</button>
      </div>
      ${v.channel?`
      <div class="ch-card">
        <div class="ch-av">${v.channel[0]||'Q'}</div>
        <div><div class="ch-name">${v.channel}</div><div class="ch-sub">قناة يوتيوب</div></div>
        <button class="sub-btn" onclick="showToast('✅ تم الاشتراك!')">اشتراك</button>
      </div>`:''}
      ${v.desc?`
      <div class="desc-box">
        <div class="desc-hd">الوصف</div>
        <div class="desc-body" id="db">${v.desc.replace(/</g,'&lt;').replace(/\n/g,'<br>').slice(0,1500)}</div>
        ${v.desc.length>200?`<span class="desc-toggle" onclick="toggleDesc()">عرض المزيد ↓</span>`:''}
      </div>`:''}
      ${v.tags?.length?`
      <div class="tags">
        ${v.tags.slice(0,12).map(t=>`<div class="tag" onclick="searchTag('${t}')">#${t}</div>`).join('')}
      </div>`:''}
    </div>`;
}

async function loadRelated(title, excludeId) {
  const list = await YT.search(title, 14);
  const filtered = list.filter(v=>v.id!==excludeId).slice(0,12);
  if (!filtered.length) {
    document.getElementById('relList').innerHTML='<div style="text-align:center;padding:20px;color:var(--mt);font-size:12px">لا توجد فيديوهات مشابهة</div>';
    return;
  }
  document.getElementById('relList').innerHTML=filtered.map(v=>`
    <div class="rel-card" onclick="location.href='vidmate_watch.html?v=${v.id}'">
      <div class="rel-thumb">
        <img src="${v.thumbnail}" loading="lazy"
          onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
        <span class="rdur">${v.duration}</span>
      </div>
      <div class="rel-info">
        <div class="rel-t">${v.title}</div>
        <div class="rel-ch">${v.channel}</div>
        <div class="rel-v">👁 ${v.views}</div>
      </div>
    </div>`).join('');
}

function openOv(){
  if(!vData){showToast('⏳ انتظر...');return;}
  document.getElementById('pc').innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--br)">
      <img src="${vData.thumbnailHigh||vData.thumbnail}"
        style="width:110px;height:62px;object-fit:cover;border-radius:7px;background:#000;flex-shrink:0"
        onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${vData.id}/hqdefault.jpg'">
      <div>
        <div style="font-size:13px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${vData.title}</div>
        <div style="font-size:11px;color:var(--mt);margin-top:3px">${vData.channel} · 👁 ${vData.views}</div>
      </div>
    </div>
    ${QUALS.map(q=>`
    <div class="qrow" onclick="doDL('${q.q}','${q.s}')">
      <span class="ql">${q.i} ${q.q}</span>
      <span class="qm">${q.s}<button class="qbtn">⬇️ تحميل</button></span>
    </div>`).join('')}
    <div style="margin-top:9px;padding:10px;background:var(--s2);border-radius:9px">
      <div style="font-size:12px;color:var(--mt);margin-bottom:7px">🎵 استخراج MP3</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="qrow" style="margin:0" onclick="doDL('MP3 128kbps','~3 MB')"><span class="ql">128 kbps</span><button class="qbtn">⬇️</button></div>
        <div class="qrow" style="margin:0" onclick="doDL('MP3 320kbps','~8 MB')"><span class="ql">320 kbps</span><button class="qbtn">⬇️</button></div>
      </div>
    </div>`;
  document.getElementById('ov').classList.add('open');
}
function closeOv(){document.getElementById('ov').classList.remove('open');}
function doDL(q,s){
  VM.addDownload({title:vData?.title||'فيديو',quality:q,size:s,platform:'YouTube',thumbnail:vData?.thumbnail});
  closeOv(); showToast('✅ تم إضافة التحميل · '+q);
}
function toggleDesc(){
  const d=document.getElementById('db'),b=document.querySelector('.desc-toggle');
  d.classList.toggle('open');b.textContent=d.classList.contains('open')?'إخفاء ↑':'عرض المزيد ↓';
}
function searchTag(t){location.href=`vidmate_index.html?search=${encodeURIComponent(t)}`;}
function shareVid(){
  const u=vData?.url||location.href;
  if(navigator.share) navigator.share({title:vData?.title||'VidMate',url:u});
  else {navigator.clipboard?.writeText(u);showToast('✅ تم نسخ الرابط!');}
}
function showToast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}
</script>
</body>
</html>
