<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#f5820d">
<title>VidMate App</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#f5820d;--primary-dark:#d96a00;--primary-glow:rgba(245,130,13,.15);
  --bg:#080808;--surface:#111;--surface2:#181818;--surface3:#222;
  --border:#2a2a2a;--text:#f0f0f0;--muted:#777;--green:#22c55e;--red:#ef4444;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;position:relative}

/* TOPBAR */
.topbar{background:var(--surface);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:900;color:var(--primary);display:flex;align-items:center;gap:7px}
.logo-box{width:30px;height:30px;background:var(--primary);border-radius:8px;display:grid;place-items:center;font-size:15px}
.topbar-search{flex:1;display:flex;align-items:center;background:var(--surface2);border-radius:22px;padding:7px 14px;gap:7px;border:1.5px solid var(--border)}
.topbar-search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1;font-family:inherit}
.topbar-search input::placeholder{color:var(--muted)}
.notif-wrap{position:relative}
.notif-dot{position:absolute;top:0;left:0;width:7px;height:7px;background:var(--red);border-radius:50%}

/* HERO BANNER */
.hero-banner{background:linear-gradient(135deg,#1a0800,#2a1000);padding:16px;border-bottom:2px solid var(--primary);display:flex;align-items:center;gap:12px}
.hero-text h2{font-size:18px;font-weight:900;color:var(--primary)}
.hero-text p{font-size:12px;color:#bbb;margin-top:2px}
.apk-btn{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}

/* URL INPUT */
.url-section{padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.url-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.url-row{display:flex;gap:6px}
.url-in{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.url-in:focus{border-color:var(--primary)}
.paste-b{background:var(--surface3);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:9px;cursor:pointer;font-size:12px;font-family:inherit}
.go-b{background:var(--primary);border:none;color:#fff;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}

/* PLATFORM CHIPS */
.chips-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.chips-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
.chips-row::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:5px;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip:hover{border-color:var(--primary);color:var(--primary)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);white-space:nowrap;border-bottom:2.5px solid transparent;font-family:inherit;background:none;border-top:none;border-right:none;border-left:none}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}

/* FEATURED SCROLL */
.feat-section{padding:10px 14px 4px}
.sec-label{font-size:13px;font-weight:700;margin-bottom:8px}
.feat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.feat-scroll::-webkit-scrollbar{height:2px}
.feat-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px}
.feat-card{min-width:160px;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0}
.feat-thumb{width:160px;height:95px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.feat-over{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:18px 7px 7px}
.feat-title{font-size:11px;color:#fff;font-weight:600;line-height:1.3}
.feat-dur{font-size:10px;color:#aaa}
.play-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;background:rgba(245,130,13,.9);border-radius:50%;display:grid;place-items:center;font-size:13px;opacity:0;transition:.2s}
.feat-card:hover .play-over{opacity:1}

/* VIDEO GRID */
.vgrid-section{padding:0 10px 10px}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.vcard{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s}
.vcard:hover{border-color:var(--primary)}
.vthumb{aspect-ratio:16/9;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
.vdur{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;padding:2px 5px;border-radius:4px}
.vinfo{padding:7px}
.vtitle{font-size:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vmeta{font-size:10px;color:var(--muted);margin-top:3px}
.vdl{display:flex;align-items:center;justify-content:center;gap:3px;background:var(--primary);color:#fff;border:none;width:100%;padding:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* PAGES */
.page{display:none;padding-bottom:68px}
.page.on{display:block}

/* SEARCH PAGE */
.search-page{padding:12px 14px 68px}
.trend-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.trend-n{font-size:14px;font-weight:700;color:var(--muted);width:22px}
.trend-t{font-size:13px}

/* LIVE PAGE */
.live-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.live-card{background:var(--surface);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;border:1.5px solid var(--border)}
.live-card:hover{border-color:var(--primary)}
.live-icon{font-size:26px;margin-bottom:5px}
.live-name{font-size:10px;color:#ccc}
.live-badge{display:inline-block;background:var(--red);color:#fff;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:700;margin-bottom:3px}

/* DOWNLOADS PAGE */
.dl-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.dl-tabs{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);overflow-x:auto}
.dl-tabs::-webkit-scrollbar{display:none}
.dltab{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:14px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
.dltab.on{background:var(--primary-glow);border-color:var(--primary);color:var(--primary);font-weight:700}
.dl-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
.dl-thumb{width:52px;height:36px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dl-info{flex:1;overflow:hidden}
.dl-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-size{font-size:10px;color:var(--muted);margin-top:2px}
.dl-status{font-size:10px;padding:3px 7px;border-radius:7px;font-weight:700;flex-shrink:0}
.dl-status.done{background:#0f2d1a;color:var(--green)}
.dl-status.prog{background:#2d1a0f;color:var(--primary)}
.prog-bg{background:var(--surface3);border-radius:3px;height:4px;margin-top:4px;overflow:hidden}
.prog-fill{height:4px;background:var(--primary);border-radius:3px;transition:width .3s}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50}
.bnav{flex:1;padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);font-size:9px;border:none;background:none;font-family:inherit;transition:.15s}
.bnav.on{color:var(--primary)}
.bnav svg{width:20px;height:20px;fill:currentColor}

/* QUALITY PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;max-width:430px;left:50%;transform:translateX(-50%)}
.overlay.open{display:flex}
.qpanel{background:var(--surface);border-top:2px solid var(--primary);border-radius:18px 18px 0 0;padding:18px;width:100%;max-height:78vh;overflow-y:auto}
.qpanel-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.qrow{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;margin-bottom:7px;cursor:pointer}
.qrow:hover{border-color:var(--primary)}
.qlabel{font-size:13px;font-weight:700}
.qmeta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.qdl{background:var(--primary);color:#fff;border:none;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--surface3);color:#fff;padding:9px 20px;border-radius:22px;font-size:12px;border:1px solid var(--border);opacity:0;transition:.3s;z-index:200;pointer-events:none;max-width:300px;text-align:center;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- TOPBAR -->

<!-- LIVE PAGE -->
<div class="page" id="page-live">

<!-- SETTINGS PAGE -->

  {e:'💪',t:'تمارين اللياقة',v:'7M',d:'30:00',c:'sports',p:'YouTube'},
];
const PLATFORMS=['▶️ YouTube','📘 Facebook','🎵 TikTok','📷 Instagram','🐦 Twitter','🎬 Dailymotion'];
const TRENDING=['ريال مدريد 2025','أحمد حلمي','موسيقى ريلاكس','مباراة اليوم','وصفة كنافة','تعلم الإنجليزية','مسلسل 2025'];
const CATS=['🎬 أفلام','🎵 موسيقى','⚽ رياضة','📺 مسلسلات','😂 كوميديا','🍳 طبخ','✈️ سفر','🎮 ألعاب'];
const LIVE=[
  {e:'📺',n:'العربية',l:true},{e:'🎙️',n:'MBC مصر',l:true},{e:'🌐',n:'BBC Arabic',l:true},
  {e:'🔴',n:'الجزيرة',l:true},{e:'⭐',n:'روتانا',l:false},{e:'📡',n:'Sport TV',l:true},
];
let currentV=null,progI=null;

// init
document.getElementById('appChips').innerHTML=PLATFORMS.map(p=>`<div class="chip">${p}</div>`).join('');
renderAppGrid(VIDS);
renderAppFeatured();

function renderAppFeatured(){
  document.getElementById('appFeatured').innerHTML=VIDS.slice(0,5).map(v=>`
    <div class="feat-card" onclick="openAppPanel(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="feat-thumb">${v.e}</div>
      <div class="play-over">▶</div>
      <div class="feat-over"><div class="feat-title">${v.t}</div><div class="feat-dur">👁 ${v.v}</div></div>
    </div>`).join('');
}

function renderAppGrid(list){
  document.getElementById('appGrid').innerHTML=list.map(v=>`
    <div class="vcard">
      <div class="vthumb">${v.e}<span class="vdur">${v.d}</span></div>
      <div class="vinfo"><div class="vtitle">${v.t}</div><div class="vmeta">👁 ${v.v}</div></div>
      <button class="vdl" onclick="openAppPanel(${JSON.stringify(v).replace(/"/g,'&quot;')})">⬇️ تحميل</button>
    </div>`).join('');
}

function switchAppTab(el,cat){
  document.querySelectorAll('#appTabs .tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const labels={trending:'🔥 ترند',movies:'🎬 أفلام',music:'🎵 موسيقى',sports:'⚽ رياضة',news:'📰 أخبار'};
  document.getElementById('appGridTitle').textContent=labels[cat]||'فيديوهات';
  renderAppGrid(cat==='trending'?VIDS:VIDS.filter(v=>v.c===cat||Math.random()>.5));
}

function goApp(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  document.getElementById('bn-'+name).classList.add('on');
  const fns={search:renderAppSearch,live:renderAppLive,dl:renderAppDl,settings:renderAppSettings};
  if(fns[name]) fns[name]();
}

function renderAppSearch(){
  document.getElementById('appTrending').innerHTML=TRENDING.map((t,i)=>`
    <div class="trend-item"><span class="trend-n">${i+1}</span><span class="trend-t">${t}</span><span style="margin-right:auto;font-size:16px">🔥</span></div>`).join('');
  document.getElementById('appCategories').innerHTML=CATS.map(c=>`<div class="chip" onclick="showToast('🔍 بحث: '+this.textContent)">${c}</div>`).join('');
}

function renderAppLive(){
  document.getElementById('appLive').innerHTML=LIVE.map(ch=>`
    <div class="live-card" onclick="showToast('📺 جاري فتح ${ch.n}')">
      ${ch.l?'<div class="live-badge">🔴 LIVE</div><br>':''}
      <div class="live-icon">${ch.e}</div>
      <div class="live-name">${ch.n}</div>
    </div>`).join('');
}

function renderAppDl(){
  const dls=VM.getDownloads();
  document.getElementById('appDlList').innerHTML=dls.length
    ? dls.map(d=>`<div class="dl-item"><div class="dl-thumb">🎬</div><div class="dl-info"><div class="dl-name">${d.title}</div><div class="dl-size">${d.size} · ${d.quality}</div></div><div class="dl-status done">✓</div></div>`).join('')
    : '<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px">لا توجد تحميلات بعد</div>';
}

function clearAppDl(){VM.saveDownloads([]);renderAppDl();showToast('✅ تم المسح');}

function renderAppSettings(){
  const s=VM.getSettings();
  document.getElementById('appSettings').innerHTML=`
    <div style="padding:12px 14px">
      <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px">
        <div style="padding:10px 14px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px">التحميل</div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px">جودة افتراضية</span><span style="font-size:12px;color:var(--primary)">1080p HD</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px">تحميل في الخلفية</span><button class="toggle on" onclick="this.classList.toggle('on')"></button></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px"><span style="font-size:13px">Wi-Fi فقط</span><button class="toggle" onclick="this.classList.toggle('on')"></button></div>
      </div>
      <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px">
        <div style="padding:10px 14px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px">النظام</div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)"><span style="font-size:13px">الإصدار</span><span style="font-size:12px;color:var(--muted)">VidMate 5.0</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)" onclick="showToast('✅ التطبيق محدث!')"><span style="font-size:13px">تحديث التطبيق</span><span style="font-size:12px;color:var(--green)">✓ محدث</span></div>
        <div style="padding:11px 14px;display:flex;justify-content:space-between"><span style="font-size:13px">مسح الكاش</span><span style="font-size:12px;color:var(--muted)">156 MB</span></div>
      </div>
    </div>`;
}

function openAppPanel(v){
  currentV=v;
  const qs=[
    {q:'4K Ultra HD',s:'~800 MB',i:'⭐'},{q:'1080p Full HD',s:'~250 MB',i:'🔵'},
    {q:'720p HD',s:'~120 MB',i:'🟢'},{q:'480p',s:'~60 MB',i:'🟡'},
    {q:'360p',s:'~30 MB',i:'🟠'},{q:'240p',s:'~15 MB',i:'🔴'},
  ];
  document.getElementById('appQualityList').innerHTML=qs.map(q=>`
    <div class="qrow" onclick="doAppDl('${q.q}','🎬','${q.s}')">
      <span class="qlabel">${q.i} ${q.q}</span>
      <span class="qmeta">${q.s} <button class="qdl">⬇️</button></span>
    </div>`).join('');
  document.getElementById('appOverlay').classList.add('open');
}
function closeAppPanel(){document.getElementById('appOverlay').classList.remove('open');}

function doAppDl(quality,emoji,size){
  if(currentV){
    VM.addDownload({title:currentV.t||'فيديو',quality,size,platform:currentV.p||'YouTube',userId:1});
  }
  closeAppPanel();
  showToast('✅ بدأ التحميل · '+quality);
}

function analyzeApp(){
  const u=document.getElementById('urlIn').value.trim();
  if(!u){showToast('❌ الصق رابط أولاً');return;}
  showToast('⚡ جاري التحليل...');
  setTimeout(()=>{currentV={t:'فيديو من الرابط',p:'YouTube'};openAppPanel(currentV);document.getElementById('urlIn').value='';},600);
}
function pasteApp(){
  navigator.clipboard?.readText().then(t=>{if(t){document.getElementById('urlIn').value=t;showToast('📋 تم اللصق!');}}).catch(()=>{document.getElementById('urlIn').value='https://youtube.com/watch?v=dQw4w9WgXcQ';showToast('📋 تم اللصق!');});
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
